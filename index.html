<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>212 Десантно-Штурмовой Батальон | Официальный сайт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Oswald', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            width: 100%;
        }

        .site-container {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* ========== ФОНОВОЕ ВИДЕО (ЗАЦИКЛЕНО) ========== */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }

        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
            pointer-events: none;
        }

        /* ========== ПАНЕЛЬ НАВИГАЦИИ ========== */
        .navbar {
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(200, 180, 100, 0.4);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .logo-area {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #e6d5a8, #b89a4c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        /* ОСНОВНОЕ МЕНЮ */
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-item {
            position: relative;
        }

        .nav-item > a {
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 1px;
            padding: 0.5rem 0;
            display: inline-block;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .nav-item > a:hover {
            color: #e7c158;
            border-bottom-color: #e7c158;
        }

        /* ВЫПАДАЮЩЕЕ ПОДМЕНЮ */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(200, 180, 100, 0.4);
            border-radius: 12px;
            padding: 0.7rem 0;
            min-width: 210px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.25s ease;
            z-index: 300;
            list-style: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .nav-item:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu li {
            width: 100%;
        }

        .dropdown-menu li a {
            display: block;
            padding: 0.6rem 1.2rem;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            white-space: nowrap;
        }

        .dropdown-menu li a:hover {
            background: rgba(231, 193, 88, 0.2);
            color: #e7c158;
            padding-left: 1.5rem;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 0;
            gap: 2rem;
            width: 100%;
        }

        /* ГЛАВНЫЙ БЛОК С НАДПИСЬЮ (ТИПА КАРТОЧКА)*/
        .hero-message {
            max-width: 900px;
            width: 90%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            padding: 2rem 3rem;
            border-radius: 32px;
            border: 1px solid rgba(210, 180, 90, 0.6);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
            margin: 0 auto;
        }

        .hero-message h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: linear-gradient(120deg, #fff, #e7b42c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-message p {
            font-size: 1.3rem;
            font-weight: 400;
            color: #f2e8cf;
            border-top: 1px solid rgba(255,215,0,0.4);
            display: inline-block;
            padding-top: 0.8rem;
        }

        /* ТЕКСТОВЫЙ БЛОК ПОД ГЛАВНЫМ МЕНЮ */
        .info-text-block {
            width: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(210, 180, 90, 0.5);
            border-bottom: 1px solid rgba(210, 180, 90, 0.5);
            padding: 2rem 0;
            margin: 0;
            text-align: left;
            animation: fadeInUp 0.9s ease-out;
        }

        .info-text-block .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 0 24px;
        }

        /* Для совсем узких экранов */
        @media (max-width: 768px) {
            .info-text-block .container {
                padding: 0 20px;
            }
        }

        @media (max-width: 480px) {
            .info-text-block .container {
                padding: 0 16px;
            }
        }

        .info-text-block h3 {
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
            color: #e7c158;
            letter-spacing: 1px;
        }

        .info-text-block p {
            font-size: 1rem;
            line-height: 1.5;
            color: #ddd;
            margin-bottom: 0.5rem;
        }

        .info-text-block .small-note {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 0.8rem;
            border-top: 1px dashed rgba(255,215,0,0.3);
            padding-top: 0.6rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 900px) {
            .navbar {
                flex-direction: column;
                gap: 0.8rem;
                padding: 0.8rem 1rem;
            }
            .nav-links {
                gap: 1.2rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .dropdown-menu {
                position: static;
                opacity: 1;
                visibility: visible;
                transform: none;
                background: rgba(0,0,0,0.7);
                margin-top: 0.5rem;
                display: none;
                border-radius: 12px;
            }
            .nav-item.active-mobile .dropdown-menu {
                display: block;
            }
            .nav-item > a {
                cursor: pointer;
            }
            .hero-message h1 {
                font-size: 2rem;
            }
            .hero-message p {
                font-size: 1rem;
            }
            .info-text-block h3 {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 550px) {
            .hero-message {
                padding: 1.2rem;
                width: 95%;
            }
            .hero-message h1 {
                font-size: 1.6rem;
            }
            .info-text-block {
                padding: 1.2rem 0;
            }
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            padding: 1rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <video class="video-background" autoplay loop muted playsinline>
        <source src="img/Main page wallpaper.mp4" type="video/mp4">
        Ваш браузер не поддерживает фоновое видео.
    </video>
    <div class="overlay-dark"></div>

    <div class="site-container">
        <!-- НАВИГАЦИЯ С ВЫПАДАЮЩИМИ ПУНКТАМИ -->
        <nav class="navbar">
            <div class="logo-area" id="logoHome">212⚡ДШБ</div>
            <ul class="nav-links">
                <!-- 1. НОВОБРАНЦАМ (без подменю) -->
                <li class="nav-item" id="nav-recruit-item">
                    <a href="#" id="nav-recruit">НОВОБРАНЦАМ</a>
                </li>
                <!-- 2. БОЙЦАМ (с выпадающем меню) -->
                <li class="nav-item" id="nav-fighter-item">
                    <a href="#" id="nav-fighter">БОЙЦАМ</a>
                    <ul class="dropdown-menu">
                        <li><a href="#" class="sub-link" data-page="charter">Устав</a></li>
                        <li><a href="#" class="sub-link" data-page="rank_system">Система повышения</a></li>
                        <li><a href="#" class="sub-link" data-page="training_system">Система тренировок</a></li>
                    </ul>
                </li>
                <!-- 3. ДОПОЛНИТЕЛЬНО -->
                <li class="nav-item" id="nav-extra-item">
                    <a href="#" id="nav-extra">ДОПОЛНИТЕЛЬНО</a>
                    <ul class="dropdown-menu">
                        <li><a href="#" class="sub-link" data-page="instructions">Инструкции</a></li>
                        <li><a href="#" class="sub-link" data-page="units">Отряды</a></li>
                        <li><a href="#" class="sub-link" data-page="documents">Документы батальона</a></li>
                    </ul>
                </li>
                <!-- 4. ИНТЕРЕСНОЕ -->
                <li class="nav-item" id="nav-interest-item">
                    <a href="#" id="nav-interest">ИНТЕРЕСНОЕ</a>
                    <ul class="dropdown-menu">
                        <li><a href="#" class="sub-link" data-page="album">Альбом</a></li>
                        <li><a href="#" class="sub-link" data-page="lore">Лор батальона</a></li>
                    </ul>
                </li>
            </ul>
        </nav>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="main-content" id="dynamic-content">

        </main>

        <div class="footer">
            © 212 Штурмовой батальон | Sunrise Of The Respublic
        </div>
    </div>

    <script>
        const contentContainer = document.getElementById('dynamic-content');
        
        // Основные пункты меню
        const recruitLink = document.getElementById('nav-recruit');
        const fighterMainLink = document.getElementById('nav-fighter');
        const extraMainLink = document.getElementById('nav-extra');
        const interestMainLink = document.getElementById('nav-interest');
        const logo = document.getElementById('logoHome');

        function createFullWidthTextBlock(title, text, note) {
            const block = document.createElement('div');
            block.className = 'info-text-block';
            
            const innerContainer = document.createElement('div');
            innerContainer.className = 'container';
            innerContainer.innerHTML = `
                <h3>${title}</h3>
                <p>${text}</p>
                <div class="small-note">${note}</div>
            `;
            block.appendChild(innerContainer);
            return block;
        }

        function renderPage(pageType, subType = null) {
            contentContainer.innerHTML = '';
            
            let heroTitle = "212 ДЕСАНТНО-ШТУРМОВОЙ БАТАЛЬОН";
            let heroSub = "Сила. Честь. Несокрушимость.";
            let infoTitle = "";
            let infoText = "";
            let infoNote = "";

            // Логика определения контента
            if (pageType === 'home') {
                heroTitle = "ШТУРМОВОЙ 212 БАТАЛЬОН";
                heroSub = "Сила. Честь. Несокрушимость.";
                infoTitle = "212th Attack Battalion";
                infoText = "212-й штурмовой батальон был одним из элитных подразделений Республики. Его возглавляли клон маршал коммандер Коуди и генерал Оби-Ван Кеноби. Солдаты 212-ого штурмового батальона отличались наличием оранжевой окраски на их броне.";
                infoNote = "212-й иногда действовал вместе с вторым батальоном. Он входил в Третью системную армию, как часть 7-го воздушного корпуса. Подразделения во 212-м штурмовом батальоне включали в себя роту «Призрак», 2-ю воздушно-десантную роту и отряд «Парджай».";
            } 
            else if (pageType === 'recruit') {
                heroTitle = "НОВОБРАНЦАМ";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'fighter' && subType === 'charter') {
                heroTitle = "УСТАВ";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'fighter' && subType === 'rank_system') {
                heroTitle = "СИСТЕМА ПОВЫШЕНИЯ";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'fighter' && subType === 'training_system') {
                heroTitle = "СИСТЕМА ТРЕНИРОВОК";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'extra' && subType === 'instructions') {
                heroTitle = "ИНСТРУКЦИИ";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'extra' && subType === 'units') {
                heroTitle = "ОТРЯДЫ";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'extra' && subType === 'documents') {
                heroTitle = "ДОКУМЕНТЫ БАТАЛЬОНА";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'interest' && subType === 'album') {
                heroTitle = "АЛЬБОМ";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else if (pageType === 'interest' && subType === 'lore') {
                heroTitle = "ЛОР БАТАЛЬОНА";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }
            else {
                heroTitle = "ШТУРМОВОЙ 212 БАТАЛЬОН";
                heroSub = "Снизу надпись";
                infoTitle = "Типа тема хз";
                infoText = "Маленькая";
                infoNote = "Очень маленькая";
            }

            const contentWrapper = document.createElement('div');
            contentWrapper.style.width = '100%';
            contentWrapper.style.display = 'flex';
            contentWrapper.style.flexDirection = 'column';
            contentWrapper.style.alignItems = 'center';
            contentWrapper.style.gap = '2rem';
            
            const heroDiv = document.createElement('div');
            heroDiv.className = 'hero-message';
            heroDiv.innerHTML = `
                <h1>${heroTitle}</h1>
                <p>${heroSub}</p>
            `;
            
            const textBlock = createFullWidthTextBlock(infoTitle, infoText, infoNote);
            
            contentWrapper.appendChild(heroDiv);
            contentWrapper.appendChild(textBlock);
            contentContainer.appendChild(contentWrapper);
            
            document.title = `212 Штурмовой | ${heroTitle}`;
        }

        // Обработка кликов по основным пунктам
        recruitLink.addEventListener('click', (e) => {
            e.preventDefault();
            renderPage('recruit', null);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActiveNavHighlight('recruit');
        });

        function attachSubmenuHandlers() {
            document.querySelectorAll('.sub-link').forEach(link => {
                link.removeEventListener('click', submenuHandler);
                link.addEventListener('click', submenuHandler);
            });
        }
        
        function submenuHandler(e) {
            e.preventDefault();
            const page = this.getAttribute('data-page');
            let parentCategory = null;
            if (this.closest('#nav-fighter-item')) parentCategory = 'fighter';
            else if (this.closest('#nav-extra-item')) parentCategory = 'extra';
            else if (this.closest('#nav-interest-item')) parentCategory = 'interest';
            
            if (parentCategory && page) {
                renderPage(parentCategory, page);
            } else {
                renderPage('home');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActiveNavHighlight(parentCategory);
        }
        
        fighterMainLink.addEventListener('click', (e) => {
            e.preventDefault();
            renderPage('fighter', 'general');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActiveNavHighlight('fighter');
        });
        
        extraMainLink.addEventListener('click', (e) => {
            e.preventDefault();
            renderPage('extra', 'general');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActiveNavHighlight('extra');
        });
        
        interestMainLink.addEventListener('click', (e) => {
            e.preventDefault();
            renderPage('interest', 'general');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActiveNavHighlight('interest');
        });
        
        const originalRender = renderPage;
        window.renderPage = function(pageType, subType) {
            if (pageType === 'fighter' && subType === 'general') {
                contentContainer.innerHTML = '';
                const wrap = document.createElement('div');
                wrap.style.width = '100%';
                wrap.style.display = 'flex';
                wrap.style.flexDirection = 'column';
                wrap.style.alignItems = 'center';
                wrap.style.gap = '2rem';
                
                const heroGen = document.createElement('div');
                heroGen.className = 'hero-message';
                heroGen.innerHTML = `<h1>БОЙЦАМ</h1><p>Надпись ниже</p>`;
                
                const textGen = createFullWidthTextBlock(
                    "Свод правил",
                    "Раздел для действующих военнослужащих. Выберите интересующий пункт из выпадающего меню: Устав, Система повышения или Система тренировок.",
                    "Каждый боец обязан знать актуальные редакции документов."
                );
                
                wrap.appendChild(heroGen);
                wrap.appendChild(textGen);
                contentContainer.appendChild(wrap);
                document.title = "212 Штурмовой | Бойцам";
                return;
            }
            if (pageType === 'extra' && subType === 'general') {
                contentContainer.innerHTML = '';
                const wrap = document.createElement('div');
                wrap.style.width = '100%';
                wrap.style.display = 'flex';
                wrap.style.flexDirection = 'column';
                wrap.style.alignItems = 'center';
                wrap.style.gap = '2rem';
                
                const heroGen = document.createElement('div');
                heroGen.className = 'hero-message';
                heroGen.innerHTML = `<h1>ДОПОЛНИТЕЛЬНО</h1><p>Надпись ниже</p>`;
                
                const textGen = createFullWidthTextBlock(
                    "Разделы",
                    "Используйте выпадающее меню 'Дополнительно' для перехода к инструкциям, списку отрядов или документам батальона.",
                    "Документы батальона строго регламентированы."
                );
                
                wrap.appendChild(heroGen);
                wrap.appendChild(textGen);
                contentContainer.appendChild(wrap);
                document.title = "212 Штурмовой | Дополнительно";
                return;
            }
            if (pageType === 'interest' && subType === 'general') {
                contentContainer.innerHTML = '';
                const wrap = document.createElement('div');
                wrap.style.width = '100%';
                wrap.style.display = 'flex';
                wrap.style.flexDirection = 'column';
                wrap.style.alignItems = 'center';
                wrap.style.gap = '2rem';
                
                const heroGen = document.createElement('div');
                heroGen.className = 'hero-message';
                heroGen.innerHTML = `<h1>ИНТЕРЕСНОЕ</h1><p>Надпись ниже</p>`;
                
                const textGen = createFullWidthTextBlock(
                    "Погружение",
                    "Выберите 'Альбом' для просмотра фотохроники или 'Лор батальона' для изучения истории подразделения.",
                    "Гордость батальона — наши ветераны."
                );
                
                wrap.appendChild(heroGen);
                wrap.appendChild(textGen);
                contentContainer.appendChild(wrap);
                document.title = "212 Штурмовой | Интересное";
                return;
            }
            originalRender(pageType, subType);
        };
        
        function setActiveNavHighlight(activeCategory) {
            const allMainLinks = [
                { id: 'nav-recruit', cat: 'recruit' },
                { id: 'nav-fighter', cat: 'fighter' },
                { id: 'nav-extra', cat: 'extra' },
                { id: 'nav-interest', cat: 'interest' }
            ];
            allMainLinks.forEach(link => {
                const el = document.getElementById(link.id);
                if (el) {
                    if (link.cat === activeCategory) {
                        el.style.borderBottom = '2px solid #e7c158';
                        el.style.color = '#e7c158';
                    } else {
                        el.style.borderBottom = '2px solid transparent';
                        el.style.color = '#f0f0f0';
                    }
                }
            });
        }

        logo.addEventListener('click', () => {
            renderPage('home', null);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setActiveNavHighlight(null);
            document.querySelectorAll('.nav-links a').forEach(a => {
                a.style.borderBottom = '2px solid transparent';
                a.style.color = '#f0f0f0';
            });
        });

        function initMobileDropdowns() {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                const link = item.querySelector('> a');
                if (item.querySelector('.dropdown-menu')) {
                    link.addEventListener('click', (e) => {
                        if (window.innerWidth <= 900) {
                            e.preventDefault();
                            item.classList.toggle('active-mobile');
                        }
                    });
                }
            });
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            renderPage('home', null);
            attachSubmenuHandlers();
            initMobileDropdowns();
            const bgVideo = document.querySelector('.video-background');
            if (bgVideo) {
                bgVideo.play().catch(e => console.log("autoplay blocked"));
            }
            setInterval(() => {
                attachSubmenuHandlers();
            }, 500);
        });
        
        const videoEl = document.querySelector('.video-background');
        if(videoEl) {
            videoEl.addEventListener('ended', function() {
                this.currentTime = 0;
                this.play().catch(()=>{});
            });
        }
    </script>
</body>
</html>
